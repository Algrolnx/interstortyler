{% if chunk_text %}
<div class="story-text text-gray-200 leading-relaxed mb-6">
    {{ chunk_text|linebreaksbr }}
</div>
{% endif %}

<div class="space-y-3">
    <p class="text-sm text-gray-500 uppercase tracking-wide mb-2">What happens next?</p>

    {% for choice in choices %}
    <button hx-post="{% url 'continue_story' story.pk %}" hx-vals='{"choice": "{{ choice|escapejs }}"}'
        hx-target="#story-content" hx-swap="beforeend"
        hx-on::after-request="document.getElementById('choices-panel').innerHTML = this.closest('.space-y-3').parentElement.outerHTML"
        class="w-full text-left bg-gray-900 hover:bg-gray-800 border border-gray-700 hover:border-purple-600 rounded-xl px-5 py-3 text-gray-300 hover:text-white transition cursor-pointer">
        <span class="text-purple-500 font-bold mr-2">{{ forloop.counter }}.</span>
        {{ choice }}
    </button>
    {% empty %}
    <p class="text-gray-600 text-sm italic">No choices available yet.</p>
    {% endfor %}

    <div class="pt-4 border-t border-gray-800">
        <p class="text-xs text-gray-600 mb-2">Or write your own:</p>
        <form hx-post="{% url 'continue_story' story.pk %}" hx-target="#story-content" hx-swap="beforeend"
            class="flex gap-2">
            {% csrf_token %}
            <input type="text" name="choice" placeholder="Write your own action..."
                class="flex-1 bg-gray-800 border border-gray-700 rounded-lg px-4 py-2 text-white text-sm focus:outline-none focus:border-purple-500">
            <button type="submit"
                class="bg-purple-700 hover:bg-purple-600 text-white px-4 py-2 rounded-lg text-sm transition">
                Go →
            </button>
        </form>
    </div>
</div>
